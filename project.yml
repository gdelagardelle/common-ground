name: CommonGround
options:
  bundleIdPrefix: com.germaind
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  knownRegions:
    - en
    - de
    - fr
    - pt
    - lb

packages:
  CommonGround:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "7"

targets:
  CommonGround:
    type: application
    platform: iOS
    sources:
      - path: CommonGround
    dependencies:
      - package: CommonGround
        product: CommonGroundFeatures
      - target: CommonGroundWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.germaind.CommonGround
        INFOPLIST_FILE: CommonGround/Info.plist
        CODE_SIGN_ENTITLEMENTS: CommonGround/CommonGround.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "3N4Q2GQ558"
        OTHER_LDFLAGS: $(inherited) -weak_framework FoundationModels
    entitlements:
      path: CommonGround/CommonGround.entitlements
      properties:
        aps-environment: production
        com.apple.developer.healthkit: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.germaind.CommonGround
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.germaind.CommonGround
        com.apple.security.application-groups:
          - group.com.germaind.CommonGround

  CommonGroundWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CommonGroundWidgets
    dependencies:
      - package: CommonGround
        product: CommonGroundCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.germaind.CommonGround.widgets
        INFOPLIST_FILE: CommonGroundWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: CommonGroundWidgets/CommonGroundWidgets.entitlements
        DEVELOPMENT_TEAM: "3N4Q2GQ558"
        CURRENT_PROJECT_VERSION: "7"
        SKIP_INSTALL: YES
    entitlements:
      path: CommonGroundWidgets/CommonGroundWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.germaind.CommonGround

  CommonGroundWatch:
    type: application
    platform: watchOS
    sources:
      - path: CommonGroundWatch
    dependencies:
      - package: CommonGround
        product: CommonGroundCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.germaind.CommonGround.watchkitapp
        INFOPLIST_FILE: CommonGroundWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: CommonGroundWatch/CommonGroundWatch.entitlements
        DEVELOPMENT_TEAM: "3N4Q2GQ558"
        SKIP_INSTALL: YES
    entitlements:
      path: CommonGroundWatch/CommonGroundWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.germaind.CommonGround

schemes:
  CommonGround:
    build:
      targets:
        CommonGround: all
        CommonGroundWidgets: all
    run:
      config: Debug
